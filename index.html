<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TheCAVE AI 클래스 자료실</title>
<style>
  :root {
    --paper: #fbf9f4;
    --ink: #1a1814;
    --ink-soft: #5a554c;
    --white: #ffffff;
    --pink: #ffb7d5;
    --mint: #a9e5c9;
    --lavender: #c9bcf2;
    --butter: #ffdd78;
    --peach: #ffb394;
    --blue: #9ed5ff;
    --pink-t: #ffe3ef;
    --mint-t: #dcf3e8;
    --lavender-t: #ece6fb;
    --butter-t: #fff1c2;
    --border: 3px solid var(--ink);
    --shadow: 6px 6px 0 var(--ink);
    --shadow-lg: 9px 9px 0 var(--ink);
    --radius: 8px;
    --font: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  html {
    min-height: 100%;
    background: #e9e4d6;
  }

  body {
    min-height: 100vh;
    margin: 0;
    background:
      linear-gradient(90deg, rgba(26, 24, 20, 0.06) 1px, transparent 1px),
      linear-gradient(rgba(26, 24, 20, 0.06) 1px, transparent 1px),
      var(--paper);
    background-size: 34px 34px;
    color: var(--ink);
    font-family: var(--font);
  }

  a { color: inherit; }

  button, input {
    font: inherit;
  }

  .shell {
    width: min(1180px, calc(100% - 36px));
    margin: 0 auto;
    padding: 46px 0 58px;
  }

  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 46px;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    border: var(--border);
    background: var(--white);
    box-shadow: 4px 4px 0 var(--ink);
    font-size: 20px;
    font-weight: 900;
  }

  .brand-mark {
    display: inline-grid;
    place-items: center;
    width: 32px;
    height: 32px;
    border: 2px solid var(--ink);
    background: var(--butter);
    font-size: 17px;
    font-weight: 900;
  }

  .status-chip {
    padding: 10px 15px;
    border: var(--border);
    background: var(--mint);
    box-shadow: 4px 4px 0 var(--ink);
    font-size: 16px;
    font-weight: 900;
    white-space: nowrap;
  }

  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 34px;
    align-items: end;
    margin-bottom: 34px;
  }

  h1 {
    max-width: 820px;
    margin: 0;
    font-size: clamp(42px, 7vw, 82px);
    line-height: 1.06;
    letter-spacing: 0;
    font-weight: 950;
    word-break: keep-all;
  }

  .hero-note {
    width: 260px;
    padding: 20px;
    border: var(--border);
    background: var(--lavender-t);
    box-shadow: var(--shadow);
    font-size: 20px;
    line-height: 1.35;
    font-weight: 800;
    word-break: keep-all;
  }

  .course-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 360px));
    gap: 30px;
    align-items: start;
  }

  .course-card {
    position: relative;
    display: grid;
    gap: 16px;
    width: 100%;
    padding: 0;
    border: 0;
    background: transparent;
    color: inherit;
    text-align: left;
    cursor: pointer;
  }

  .course-card:focus-visible .poster-wrap {
    outline: 5px solid var(--blue);
    outline-offset: 5px;
  }

  .poster-wrap {
    position: relative;
    overflow: hidden;
    aspect-ratio: 9 / 16;
    border: var(--border);
    border-radius: var(--radius);
    background: var(--white);
    box-shadow: var(--shadow-lg);
    transition: transform 160ms ease, box-shadow 160ms ease;
  }

  .course-card:hover .poster-wrap {
    transform: translate(-3px, -3px);
    box-shadow: 12px 12px 0 var(--ink);
  }

  .poster-wrap img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .course-state {
    position: absolute;
    top: 14px;
    right: 14px;
    padding: 7px 11px;
    border: 2px solid var(--ink);
    background: var(--butter);
    font-size: 13px;
    font-weight: 900;
  }

  .course-meta {
    display: grid;
    gap: 8px;
    padding: 0 6px;
  }

  .course-kicker {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .mini-chip {
    display: inline-flex;
    padding: 6px 10px;
    border: 2px solid var(--ink);
    background: var(--pink-t);
    font-size: 14px;
    font-weight: 900;
  }

  .course-title {
    font-size: 24px;
    line-height: 1.22;
    font-weight: 950;
    word-break: keep-all;
  }

  .next-note {
    display: inline-flex;
    max-width: 420px;
    margin: 34px 0 0;
    padding: 14px 18px;
    border: var(--border);
    border-radius: var(--radius);
    background: var(--mint-t);
    box-shadow: 4px 4px 0 var(--ink);
    color: var(--ink-soft);
    font-size: 17px;
    line-height: 1.3;
    font-weight: 900;
    word-break: keep-all;
  }

  .tool-strip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
    max-width: 780px;
    margin: 28px 0 0;
    padding: 18px 20px;
    border: var(--border);
    border-radius: var(--radius);
    background: var(--butter-t);
    box-shadow: var(--shadow);
  }

  .tool-strip-copy {
    display: grid;
    gap: 5px;
    word-break: keep-all;
  }

  .tool-strip-title {
    font-size: 22px;
    line-height: 1.2;
    font-weight: 950;
  }

  .tool-strip-desc {
    color: var(--ink-soft);
    font-size: 16px;
    line-height: 1.35;
    font-weight: 800;
  }

  .tool-strip-link {
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 48px;
    padding: 0 16px;
    border: var(--border);
    border-radius: var(--radius);
    background: var(--mint);
    box-shadow: 4px 4px 0 var(--ink);
    color: var(--ink);
    font-size: 16px;
    font-weight: 950;
    text-decoration: none;
    white-space: nowrap;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    display: none;
    place-items: center;
    padding: 24px;
    background: rgba(26, 24, 20, 0.45);
    z-index: 20;
  }

  .modal-backdrop.is-open {
    display: grid;
  }

  .modal {
    width: min(520px, 100%);
    border: var(--border);
    border-radius: var(--radius);
    background: var(--paper);
    box-shadow: 12px 12px 0 var(--ink);
  }

  .modal-head {
    display: flex;
    justify-content: space-between;
    gap: 14px;
    align-items: start;
    padding: 24px 24px 18px;
    border-bottom: var(--border);
    background: var(--butter);
  }

  .modal-title {
    margin: 0;
    font-size: 30px;
    line-height: 1.2;
    font-weight: 950;
    word-break: keep-all;
  }

  .close-btn {
    display: inline-grid;
    place-items: center;
    width: 38px;
    height: 38px;
    border: 2px solid var(--ink);
    background: var(--white);
    box-shadow: 3px 3px 0 var(--ink);
    cursor: pointer;
    font-size: 22px;
    font-weight: 900;
  }

  .modal-body {
    display: grid;
    gap: 18px;
    padding: 24px;
  }

  .modal-copy {
    margin: 0;
    color: var(--ink-soft);
    font-size: 18px;
    line-height: 1.45;
    font-weight: 800;
    word-break: keep-all;
  }

  .code-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 12px;
  }

  .code-input {
    min-width: 0;
    height: 58px;
    padding: 0 16px;
    border: var(--border);
    border-radius: var(--radius);
    background: var(--white);
    color: var(--ink);
    font-size: 24px;
    font-weight: 950;
    outline: none;
  }

  .code-input:focus {
    box-shadow: 0 0 0 5px var(--lavender);
  }

  .enter-btn {
    min-width: 118px;
    height: 58px;
    padding: 0 18px;
    border: var(--border);
    border-radius: var(--radius);
    background: var(--pink);
    box-shadow: 4px 4px 0 var(--ink);
    color: var(--ink);
    cursor: pointer;
    font-size: 18px;
    font-weight: 950;
  }

  .enter-btn:active,
  .close-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--ink);
  }

  .error {
    min-height: 24px;
    color: #b00020;
    font-size: 16px;
    font-weight: 900;
  }

  .screen-reader {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip: rect(0 0 0 0);
    white-space: nowrap;
  }

  @media (max-width: 760px) {
    .shell {
      width: min(100% - 24px, 520px);
      padding: 22px 0 36px;
    }

    .topbar,
    .hero {
      display: grid;
      grid-template-columns: 1fr;
      align-items: start;
    }

    .topbar {
      margin-bottom: 28px;
    }

    .status-chip {
      justify-self: start;
      white-space: normal;
    }

    .hero {
      gap: 18px;
    }

    .hero-note {
      width: 100%;
      font-size: 18px;
    }

    .course-grid {
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .tool-strip {
      display: grid;
      grid-template-columns: 1fr;
    }

    .tool-strip-link {
      width: 100%;
    }

    .code-row {
      grid-template-columns: 1fr;
    }

    .enter-btn {
      width: 100%;
    }
  }
</style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div class="brand" aria-label="TheCAVE AI Class">
        <span class="brand-mark">AI</span>
        <span>TheCAVE CLASS</span>
      </div>
      <div class="status-chip">수업 자료 입장</div>
    </header>

    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">수업 포스터를 누르면 자료가 열립니다</h1>
      <div class="hero-note">안내받은 코드를 입력하면 해당 수업 슬라이드로 이동합니다.</div>
    </section>

    <section class="course-grid" id="course-grid" aria-label="수업 목록"></section>
    <section class="tool-strip" aria-label="수업 보조 도구">
      <div class="tool-strip-copy">
        <div class="tool-strip-title">불편함 채굴기</div>
        <div class="tool-strip-desc">수업 중 짧은 귀찮음을 여러 개 꺼낼 때 씁니다.</div>
      </div>
      <a class="tool-strip-link" href="tools/friction-miner/">열기</a>
    </section>
    <p class="next-note">다음 수업 포스터가 준비되면 이 자리에 이어집니다.</p>
  </main>

  <div class="modal-backdrop" id="code-modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-copy">
    <div class="modal">
      <div class="modal-head">
        <h2 class="modal-title" id="modal-title">입장 코드</h2>
        <button class="close-btn" type="button" data-close aria-label="닫기">×</button>
      </div>
      <form class="modal-body" id="code-form">
        <p class="modal-copy" id="modal-copy">수업 안내에서 받은 코드를 입력하세요.</p>
        <label class="screen-reader" for="course-code">수업 코드</label>
        <div class="code-row">
          <input class="code-input" id="course-code" name="code" inputmode="text" autocomplete="one-time-code" placeholder="코드 입력">
          <button class="enter-btn" type="submit">입장하기</button>
        </div>
        <div class="error" id="code-error" role="alert" aria-live="polite"></div>
      </form>
    </div>
  </div>

<script>
  const COURSES = [
    {
      id: "chiljeon-palpal-school-01",
      title: "칠전팔팔학교 AI 클래스",
      round: "1회차",
      date: "2026.06.19",
      poster: "assets/posters/chiljeonpalpal-ai-class-poster.png",
      target: "courses/chiljeon-palpal-school/01/index.html?v=20260618-qr",
      codeHash: "2016478d9492c6ea60a144f25e5df8d21b89c6ad1707846d716ee59343770997",
    },
  ];

  const grid = document.getElementById("course-grid");
  const modal = document.getElementById("code-modal");
  const form = document.getElementById("code-form");
  const input = document.getElementById("course-code");
  const error = document.getElementById("code-error");
  const modalTitle = document.getElementById("modal-title");
  const modalCopy = document.getElementById("modal-copy");
  let activeCourse = null;

  function accessKey(course) {
    return `class-materials-access:${course.id}`;
  }

  function hasAccess(course) {
    try {
      const access = JSON.parse(localStorage.getItem(accessKey(course)) || "null");
      return access && access.ok === true;
    } catch {
      return false;
    }
  }

  function setAccess(course) {
    localStorage.setItem(accessKey(course), JSON.stringify({
      ok: true,
      unlockedAt: new Date().toISOString(),
    }));
  }

  function esc(value) {
    return String(value).replace(/[&<>"']/g, (ch) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;",
    }[ch]));
  }

  async function sha256(value) {
    if (!crypto || !crypto.subtle) {
      throw new Error("WebCrypto is unavailable");
    }
    const bytes = new TextEncoder().encode(value);
    const hash = await crypto.subtle.digest("SHA-256", bytes);
    return Array.from(new Uint8Array(hash)).map((b) => b.toString(16).padStart(2, "0")).join("");
  }

  function renderCourses() {
    grid.innerHTML = COURSES.map((course) => `
      <button class="course-card" type="button" data-course="${esc(course.id)}">
        <div class="poster-wrap">
          <img src="${esc(course.poster)}" alt="${esc(course.title)} 포스터">
          <span class="course-state">${hasAccess(course) ? "열림" : "코드"}</span>
        </div>
        <div class="course-meta">
          <div class="course-kicker">
            <span class="mini-chip">${esc(course.round)}</span>
            <span class="mini-chip">${esc(course.date)}</span>
          </div>
          <div class="course-title">${esc(course.title)}</div>
        </div>
      </button>
    `).join("");

    grid.querySelectorAll(".course-card").forEach((card) => {
      card.addEventListener("click", () => {
        const course = COURSES.find((item) => item.id === card.dataset.course);
        if (!course) return;
        if (hasAccess(course)) {
          location.href = course.target;
          return;
        }
        openModal(course);
      });
    });
  }

  function openModal(course) {
    activeCourse = course;
    modalTitle.textContent = `${course.round} 입장 코드`;
    modalCopy.textContent = `${course.title} 자료를 엽니다.`;
    input.value = "";
    error.textContent = "";
    modal.classList.add("is-open");
    window.setTimeout(() => input.focus(), 0);
  }

  function closeModal() {
    modal.classList.remove("is-open");
    activeCourse = null;
    error.textContent = "";
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    if (!activeCourse) return;
    const code = input.value.trim();
    if (!code) {
      error.textContent = "코드를 입력해주세요.";
      input.focus();
      return;
    }

    try {
      const digest = await sha256(code);
      if (digest !== activeCourse.codeHash) {
        error.textContent = "코드를 다시 확인해주세요.";
        input.select();
        return;
      }
      setAccess(activeCourse);
      location.href = activeCourse.target;
    } catch {
      error.textContent = "HTTPS 또는 localhost 주소에서 다시 열어주세요.";
    }
  });

  modal.addEventListener("click", (event) => {
    if (event.target === modal || event.target.closest("[data-close]")) closeModal();
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "Escape" && modal.classList.contains("is-open")) closeModal();
  });

  renderCourses();

  const requestedCourse = new URLSearchParams(location.search).get("course");
  if (requestedCourse) {
    const course = COURSES.find((item) => item.id === requestedCourse);
    if (course && !hasAccess(course)) openModal(course);
  }
</script>
</body>
</html>
