<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>칠전팔팔학교 AI 클래스 — 새 덱</title>
<style>
  :root {
    /* 베이스 — 정본 토큰 */
    --paper:   #FBF9F4;
    --ink:     #1A1814;
    --white:   #FFFFFF;
    --ink-soft:#5A554C;

    /* 파스텔 5색 — 정본 (기존 덱 lilac/blue 보강) */
    --pink:     #FFB7D5;
    --mint:     #A9E5C9;
    --lavender: #C9BCF2;
    --butter:   #FFDD78;
    --peach:    #FFB394;
    --blue:     #9ED5FF;

    /* 파스텔 틴트 */
    --pink-t:     #FFE3EF;
    --mint-t:     #DCF3E8;
    --lavender-t: #ECE6FB;
    --butter-t:   #FFF1C2;
    --peach-t:    #FFE0D2;
    --blue-t:     #DDF0FF;

    --font: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic",
            -apple-system, BlinkMacSystemFont, system-ui, sans-serif;

    /* 네오브루탈리즘 메커니즘 */
    --border:  3px solid var(--ink);
    --shadow:  6px 6px 0 var(--ink);
    --shadow-lg: 8px 8px 0 var(--ink);
    --shadow-sm: 4px 4px 0 var(--ink);

    /* 섹션 주색 (JS가 슬라이드에 --accent / --accent-t 주입) */
    --accent:   var(--lavender);
    --accent-t: var(--lavender-t);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #e9e4d6;
    color: var(--ink);
    font-family: var(--font);
    overflow: hidden;
  }

  /* ===== 고정 스테이지 + 스케일 ===== */
  /* viewport 채우는 래퍼. 스테이지를 시각 중앙정렬 후 JS scale 적용.
     주의: scale은 시각 크기만 줄이고 레이아웃 점유는 1600×900 그대로다.
     그래서 grid place-items:center로 줄이면 작은 창에서 음수 오프셋으로 잘린다.
     → left/top 50% + translate(-50%,-50%) scale(k) 로 점유와 무관하게 중앙정렬. */
  #viewport {
    position: fixed; inset: 0;
    overflow: hidden;
  }

  #stage {
    position: absolute;
    left: 50%; top: 50%;
    width: 1600px;
    height: 900px;
    transform-origin: center center;
    transform: translate(-50%, -50%) scale(1);
    background: var(--paper);
    overflow: hidden;
    /* 격자 무늬 없음 — 기존 덱 실패 회피. 플랫 단색 */
  }

  /* 각 슬라이드는 스테이지 위 절대 1600×900. 한 장만 표시 */
  .slide {
    position: absolute; inset: 0;
    width: 1600px; height: 900px;
    display: none;
    padding: 64px 110px;
    overflow: hidden;
  }
  .slide.is-active { display: block; }

  /* 섹션 라벨 칩 (좌상단) — 작게, 허용 요소 */
  .section-chip {
    position: absolute; top: 40px; left: 56px;
    display: inline-flex; align-items: center;
    padding: 8px 16px;
    background: var(--accent);
    border: var(--border);
    box-shadow: var(--shadow-sm);
    font-size: 22px; font-weight: 800;
    letter-spacing: 0.01em;
    z-index: 5;
  }

  /* 우하단 페이지 번호 */
  .page-num {
    position: absolute; bottom: 34px; right: 56px;
    display: inline-flex; align-items: baseline; gap: 4px;
    padding: 6px 14px;
    background: var(--white);
    border: var(--border);
    box-shadow: var(--shadow-sm);
    font-size: 24px; font-weight: 900;
    z-index: 5;
  }
  .page-num .cur { font-size: 30px; }
  .page-num .sep { color: var(--ink-soft); }
  .page-num .tot { color: var(--ink-soft); font-size: 20px; }

  /* 하단 진행 바 */
  #progress-track {
    position: absolute; left: 0; bottom: 0;
    width: 100%; height: 10px;
    background: var(--accent-t);
    border-top: var(--border);
    z-index: 6;
  }
  #progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.3s ease;
    width: 0;
  }

  /* ===== 공통 타이포 ===== */
  /* line-height는 글리프(한글+라틴 ascender/descender)가 line box를 넘치지 않을
     안전선으로 둔다. 1.0~1.08은 디스플레이에서 미세 세로 overflow를 만든다. */
  .hero {
    font-size: 84px; font-weight: 900;
    line-height: 1.12; letter-spacing: -0.02em;
    word-break: keep-all; max-width: 16em;
  }
  .h1 {
    font-size: 60px; font-weight: 900;
    line-height: 1.16; letter-spacing: -0.02em;
    word-break: keep-all;
  }
  .h2 { font-size: 40px; font-weight: 800; line-height: 1.2; letter-spacing: -0.01em; word-break: keep-all; }
  .body { font-size: 32px; font-weight: 600; line-height: 1.45; word-break: keep-all; }
  .body-lg { font-size: 38px; font-weight: 700; line-height: 1.4; word-break: keep-all; }
  .label { font-size: 22px; font-weight: 700; line-height: 1.3; letter-spacing: 0.04em; }

  /* 키커 */
  .kicker {
    display: inline-flex; align-items: center;
    padding: 8px 18px;
    background: var(--accent);
    border: var(--border);
    box-shadow: var(--shadow-sm);
    font-size: 24px; font-weight: 800;
    letter-spacing: 0.02em;
  }

  /* 카드 */
  .card {
    background: var(--white);
    border: var(--border);
    box-shadow: var(--shadow);
    padding: 32px;
  }

  /* ===== layout: cover ===== */
  /* 포스터는 세로 긴 비율(1152×2048). 폭 기준으로 맞추면 높이가 넘친다.
     → 우측 컬럼을 포스터 높이(가용 772px)에 맞춘 폭으로 고정하고 세로 정렬. */
  .cover-grid {
    display: grid;
    grid-template-columns: 1fr 440px;
    gap: 64px;
    height: 100%;
    align-items: center;
  }
  .cover-left { display: flex; flex-direction: column; gap: 28px; }
  .cover-sub-chip {
    align-self: flex-start;
    padding: 10px 22px;
    background: var(--butter);
    border: var(--border);
    box-shadow: var(--shadow-sm);
    font-size: 30px; font-weight: 800;
  }
  .cover-title {
    font-size: 76px; font-weight: 900;
    line-height: 1.2; letter-spacing: -0.02em;
    word-break: keep-all;
  }
  .cover-classname {
    font-size: 30px; font-weight: 800; color: var(--ink-soft);
    letter-spacing: 0.01em;
  }
  .cover-outputs {
    display: flex; gap: 18px; flex-wrap: wrap; margin-top: 6px;
  }
  .output-chip {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 16px 22px;
    border: var(--border);
    box-shadow: var(--shadow-sm);
    font-size: 28px; font-weight: 800;
  }
  .output-chip .step-no {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 34px;
    background: var(--ink); color: var(--white);
    border-radius: 50%;
    font-size: 20px; font-weight: 900;
  }
  .output-chip.c1 { background: var(--mint); }
  .output-chip.c2 { background: var(--peach); }
  .output-chip.c3 { background: var(--lavender); }
  .cover-tail { font-size: 28px; font-weight: 700; color: var(--ink-soft); margin-top: 8px; word-break: keep-all; }

  /* 포스터 프레임 — 어떤 요소도 포스터를 가리지 않음 */
  .poster-frame {
    border: var(--border);
    box-shadow: var(--shadow-lg);
    background: var(--white);
    padding: 0;
    overflow: hidden;
    line-height: 0;
  }
  .poster-frame img {
    display: block;
    width: 100%;           /* 프레임 content box(440 - 테두리)에 맞춤 — scrollWidth 넘침 방지 */
    height: auto;
    max-height: 710px;     /* contain-fit 실픽셀 하단 = 450 + H/2 = 805 < 칩 top(실측 812) — 7px 이격. 세로 넘침 방지 */
    object-fit: contain;
  }

  /* ===== layout: split (좌 카피 / 우 캡처) ===== */
  .split-grid {
    display: grid;
    grid-template-columns: 640px 1fr;
    gap: 72px;
    height: 100%;
    align-items: center;
    padding-top: 40px;
  }
  .split-left { display: flex; flex-direction: column; gap: 32px; }
  .split-headline { font-size: 58px; font-weight: 900; line-height: 1.16; letter-spacing: -0.02em; word-break: keep-all; }
  .split-sub { font-size: 34px; font-weight: 600; line-height: 1.45; color: var(--ink); word-break: keep-all; }
  .split-tags { display: flex; gap: 14px; flex-wrap: wrap; margin-top: 8px; }
  .split-tag {
    padding: 10px 20px;
    background: var(--accent-t);
    border: var(--border);
    font-size: 24px; font-weight: 800;
  }

  /* 브라우저 창 프레임 컴포넌트 */
  .browser-frame {
    border: var(--border);
    box-shadow: var(--shadow-lg);
    background: var(--white);
    overflow: hidden;
    width: 100%;
  }
  .browser-bar {
    display: flex; align-items: center; gap: 14px;
    height: 56px; padding: 0 22px;
    background: var(--accent);
    border-bottom: var(--border);
  }
  .browser-dots { display: flex; gap: 10px; }
  .browser-dots span {
    width: 18px; height: 18px; border-radius: 50%;
    border: 2.5px solid var(--ink);
    background: var(--white);
  }
  .browser-url {
    flex: 1;
    height: 34px;
    background: var(--white);
    border: 2.5px solid var(--ink);
    border-radius: 4px;
    display: flex; align-items: center;
    padding: 0 16px;
    font-size: 20px; font-weight: 700; color: var(--ink-soft);
    overflow: hidden; white-space: nowrap;
  }
  .browser-body { line-height: 0; background: var(--white); }
  .browser-body img { display: block; width: 100%; height: auto; }

  /* ===== layout: files (파일 카드 2종) ===== */
  /* 상단 정렬 레이아웃이라 제목이 섹션칩(top 40, 높이 ~47)과 겹치지 않게 여백 확보 */
  .files-head { margin-top: 56px; margin-bottom: 40px; }
  .files-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 44px;
  }
  .file-card {
    background: var(--white);
    border: var(--border);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .file-card .filebar {
    display: flex; align-items: center; gap: 14px;
    padding: 22px 28px;
    border-bottom: var(--border);
    font-size: 36px; font-weight: 900;
    letter-spacing: -0.01em;
  }
  .file-card.f1 .filebar { background: var(--mint); }
  .file-card.f2 .filebar { background: var(--butter); }
  .file-card .fileicon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 48px; height: 48px;
    background: var(--ink); color: var(--white);
    font-size: 22px; font-weight: 900;
    flex-shrink: 0;
  }
  .file-card .filedesc {
    padding: 22px 28px 6px;
    font-size: 28px; font-weight: 700; color: var(--ink-soft);
    word-break: keep-all;
  }
  .file-card ul { list-style: none; padding: 14px 28px 30px; display: flex; flex-direction: column; gap: 16px; }
  .file-card li {
    display: flex; align-items: flex-start; gap: 16px;
    font-size: 29px; font-weight: 700; line-height: 1.3; word-break: keep-all;
  }
  .file-card li .bullet {
    flex-shrink: 0; margin-top: 4px;
    width: 26px; height: 26px;
    border: 3px solid var(--ink);
  }
  .file-card.f1 li .bullet { background: var(--mint); }
  .file-card.f2 li .bullet { background: var(--butter); }
  .files-foot {
    margin-top: 36px;
    font-size: 28px; font-weight: 700; color: var(--ink-soft);
    word-break: keep-all;
  }

  /* ===== 공통: 상단 정렬 장의 헤더 (섹션칩과 겹침 방지) ===== */
  .top-head { margin-top: 52px; margin-bottom: 36px; }
  .top-head .lead { margin-top: 16px; font-size: 32px; font-weight: 600; color: var(--ink-soft); word-break: keep-all; max-width: 30em; }

  /* ===== layout: statement (전환·프레임 한 메시지) ===== */
  .stmt-wrap {
    height: 100%;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center;
    gap: 32px; padding-right: 60px;
  }
  .stmt-kicker {
    align-self: flex-start;
    padding: 10px 22px;
    background: var(--accent);
    border: var(--border); box-shadow: var(--shadow-sm);
    font-size: 28px; font-weight: 800;
  }
  .stmt-head {
    font-size: 76px; font-weight: 900; line-height: 1.2;
    letter-spacing: -0.02em; word-break: keep-all; max-width: 17em;
  }
  .stmt-head em { font-style: normal; background: var(--accent); padding: 0 12px; box-decoration-break: clone; -webkit-box-decoration-break: clone; }
  .stmt-sub { font-size: 36px; font-weight: 600; line-height: 1.45; color: var(--ink-soft); word-break: keep-all; max-width: 24em; }
  .stmt-tail {
    display: inline-flex; align-items: center; gap: 14px;
    padding: 16px 26px; background: var(--white);
    border: var(--border); box-shadow: var(--shadow-sm);
    font-size: 30px; font-weight: 800; word-break: keep-all;
  }
  .stmt-tail .arr { font-size: 32px; }

  /* ===== layout: agenda (3덩어리 진행) ===== */
  .agenda-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 36px; margin-top: 8px; }
  .agenda-card {
    background: var(--white); border: var(--border); box-shadow: var(--shadow);
    padding: 36px 32px; display: flex; flex-direction: column; gap: 18px;
    min-height: 440px;
  }
  .agenda-card .a-time {
    align-self: flex-start;
    padding: 10px 20px; border: var(--border); box-shadow: var(--shadow-sm);
    font-size: 28px; font-weight: 900;
  }
  .agenda-card.a1 .a-time { background: var(--lavender); }
  .agenda-card.a2 .a-time { background: var(--butter); }
  .agenda-card.a3 .a-time { background: var(--peach); }
  .agenda-card .a-title { font-size: 40px; font-weight: 900; line-height: 1.15; letter-spacing: -0.01em; word-break: keep-all; }
  .agenda-card .a-desc { font-size: 28px; font-weight: 600; line-height: 1.4; color: var(--ink-soft); word-break: keep-all; }
  .agenda-foot { margin-top: 38px; font-size: 30px; font-weight: 700; line-height: 1.5; color: var(--ink); word-break: keep-all; }
  .agenda-foot em { font-style: normal; background: var(--accent); padding: 2px 10px; }

  /* ===== layout: flow (전환 도해: 전 → 후) ===== */
  /* height 고정: 슬라이드(900) - 상단 패딩(64) - 헤더(약 122) - 하단 여백(약 70) ≈ 590.
     height:100%는 블록 흐름에서 헤더 위치를 무시해 세로 넘침을 만든다 → 고정값으로 둔다. */
  .flow-wrap { display: flex; align-items: stretch; justify-content: center; gap: 40px; height: 576px; padding: 22px 0 0; }
  .flow-node {
    flex: 1; max-width: 480px;
    background: var(--white); border: var(--border); box-shadow: var(--shadow-lg);
    padding: 32px 32px; display: flex; flex-direction: column; gap: 16px;
    justify-content: center; overflow: hidden;
  }
  .flow-node.before { background: var(--paper); }
  .flow-node.after  { background: var(--accent-t); }
  .flow-node .fn-tag {
    align-self: flex-start; padding: 8px 18px;
    border: var(--border); box-shadow: var(--shadow-sm);
    font-size: 24px; font-weight: 800; background: var(--white);
  }
  .flow-node.after .fn-tag { background: var(--accent); }
  .flow-node .fn-title { font-size: 38px; font-weight: 900; line-height: 1.18; word-break: keep-all; }
  .flow-node .fn-desc { font-size: 28px; font-weight: 600; line-height: 1.4; color: var(--ink-soft); word-break: keep-all; }
  /* 말풍선 (before가 메시지일 때) */
  .fn-bubble {
    background: var(--mint-t); border: var(--border);
    border-radius: 18px 18px 18px 4px; padding: 22px 26px;
    font-size: 27px; font-weight: 600; line-height: 1.4; color: var(--ink); word-break: keep-all;
  }
  .fn-bubble + .fn-bubble { margin-top: 4px; }
  /* 작은 페이지 프레임 (after가 사이트일 때) */
  .fn-page {
    border: var(--border); background: var(--white); overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .fn-page .fp-bar { height: 30px; background: var(--accent); border-bottom: 2.5px solid var(--ink); display: flex; align-items: center; gap: 7px; padding: 0 12px; }
  .fn-page .fp-bar span { width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--ink); background: var(--white); }
  .fn-page .fp-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 10px; }
  .fn-page .fp-h { height: 22px; width: 60%; background: var(--ink); }
  .fn-page .fp-langs { display: flex; gap: 8px; }
  .fn-page .fp-langs b { font-size: 17px; font-weight: 800; padding: 3px 10px; border: 2px solid var(--ink); background: var(--accent-t); }
  .fn-page .fp-line { height: 13px; background: #ddd6c8; }
  .fn-page .fp-line.s { width: 78%; }
  .flow-arrow { font-size: 64px; font-weight: 900; color: var(--ink); flex-shrink: 0; }

  /* ===== layout: cards (카드 N개 그리드) ===== */
  .cards-grid { display: grid; gap: 30px; margin-top: 4px; }
  .cards-grid.c2 { grid-template-columns: 1fr 1fr; }
  .cards-grid.c3 { grid-template-columns: repeat(3, 1fr); }
  .cards-grid.c4 { grid-template-columns: repeat(2, 1fr); }
  .cards-grid.c6 { grid-template-columns: repeat(3, 1fr); gap: 24px; }
  /* 6칸(3열2행)은 밀도가 높으므로 카드 패딩·폰트를 한 단계 줄여 세로 넘침 방지 */
  .cards-grid.c6 .gcard { padding: 24px 26px; gap: 10px; }
  .cards-grid.c6 .gc-title { font-size: 31px; }
  .cards-grid.c6 .gc-desc { font-size: 26px; }
  .cards-grid.c6 .gc-no { min-width: 44px; height: 44px; font-size: 22px; }
  .gcard {
    background: var(--white); border: var(--border); box-shadow: var(--shadow);
    padding: 30px 32px; display: flex; flex-direction: column; gap: 14px;
  }
  .gcard .gc-no {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 50px; height: 50px; padding: 0 14px; flex-shrink: 0;
    background: var(--accent); border: var(--border);
    font-size: 25px; font-weight: 900; line-height: 1; white-space: nowrap;
  }
  .gcard .gc-title { font-size: 33px; font-weight: 900; line-height: 1.2; word-break: keep-all; }
  .gcard .gc-desc { font-size: 28px; font-weight: 600; line-height: 1.4; color: var(--ink-soft); word-break: keep-all; }
  .gcard .gc-head { display: flex; align-items: center; gap: 16px; }
  .cards-foot { margin-top: 34px; font-size: 30px; font-weight: 700; line-height: 1.5; color: var(--ink); word-break: keep-all; }
  .cards-foot em { font-style: normal; background: var(--accent); padding: 2px 10px; }

  /* ===== layout: tracks (A/B/C 3트랙) ===== */
  .tracks-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; margin-top: 8px; }
  .track {
    border: var(--border); box-shadow: var(--shadow); background: var(--white);
    display: flex; flex-direction: column; overflow: hidden; min-height: 470px;
  }
  .track .t-band {
    padding: 22px 28px; border-bottom: var(--border);
    display: flex; align-items: center; gap: 16px;
  }
  .track.tA .t-band { background: var(--mint); }
  .track.tB .t-band { background: var(--butter); }
  .track.tC .t-band { background: var(--peach); }
  .track .t-letter {
    display: inline-flex; align-items: center; justify-content: center;
    width: 56px; height: 56px; flex-shrink: 0;
    background: var(--ink); color: var(--white);
    font-size: 32px; font-weight: 900; border-radius: 50%;
  }
  .track .t-name { font-size: 30px; font-weight: 900; line-height: 1.15; word-break: keep-all; }
  .track .t-cond { padding: 22px 28px 8px; font-size: 27px; font-weight: 700; color: var(--ink-soft); word-break: keep-all; }

/* ---------- 렌더 함수 ---------- */
function esc(s) {
  return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
function nl2br(s) { return esc(s).replace(/\n/g, "<br>"); }

function renderChrome(s) {
  // 섹션 칩 + 페이지 번호 (모든 장 공통)
  return `
    <div class="section-chip">${esc(s.section)}</div>
    <div class="page-num"><span class="cur">${s.no}</span><span class="sep">/</span><span class="tot">${TOTAL}</span></div>
  `;
}

function renderCover(s) {
  const outs = s.outputs.map((o, i) => `
    <div class="output-chip c${i + 1}"><span class="step-no">${i + 1}</span>${esc(o)}</div>
  `).join("");
  return `
    <div class="cover-grid">
      <div class="cover-left">
        <div class="cover-sub-chip">${esc(s.subtitle)}</div>
        <h1 class="cover-title">${nl2br(s.title)}</h1>
        <div class="cover-classname">${esc(s.className)}</div>
        <div class="cover-outputs">${outs}</div>
        <div class="cover-tail">${esc(s.tail)}</div>
      </div>
      <div class="poster-frame">
        <img src="${s.poster}" alt="칠전팔팔학교 AI 클래스 포스터">
      </div>
    </div>
  `;
}

function renderSplit(s) {
  const tags = s.tags.map(t => `<span class="split-tag">${esc(t)}</span>`).join("");
  return `
    <div class="split-grid">
      <div class="split-left">
        <h2 class="split-headline">${nl2br(s.headline)}</h2>
        <p class="split-sub">${nl2br(s.sub)}</p>
        <div class="split-tags">${tags}</div>
      </div>
      <div class="browser-frame">
        <div class="browser-bar">
          <div class="browser-dots"><span></span><span></span><span></span></div>
          <div class="browser-url">${esc(s.captureUrl)}</div>
        </div>
        <div class="browser-body"><img src="${s.capture}" alt="ChatGPT 실제 화면 캡처"></div>
      </div>
    </div>
  `;
}

function renderFiles(s) {
  const cards = s.files.map((f, i) => {
    const lis = f.items.map(it => `<li><span class="bullet"></span><span>${esc(it)}</span></li>`).join("");
    return `
      <div class="file-card f${i + 1}">
        <div class="filebar"><span class="fileicon">${esc(f.icon)}</span>${esc(f.name)}</div>
        <div class="filedesc">${esc(f.desc)}</div>
        <ul>${lis}</ul>
      </div>
    `;
  }).join("");
  return `
    <div class="files-head">
      <h2 class="h1">${esc(s.title)}</h2>
      <p class="body" style="margin-top:18px;color:var(--ink-soft);">${esc(s.intro)}</p>
    </div>
    <div class="files-grid">${cards}</div>
    <p class="files-foot">${esc(s.foot)}</p>
  `;
}

function renderTodo(s) {
  // 미완성 placeholder — 오버플로 없게, 화면에 내부 작업메모 노출 금지(중립 라벨만)
  return `
    <div class="ph-wrap">
      <div class="ph-no">${String(s.no).padStart(2, "0")}</div>
      <h2 class="ph-title">${esc(s.title)}</h2>
      <div class="ph-badge"><span class="dot"></span>제작 중</div>
    </div>
  `;
}

function renderStatement(s) {
  const head = s.headHtml || nl2br(s.head);
  return `
    <div class="stmt-wrap">
      ${s.kicker ? `<div class="stmt-kicker">${esc(s.kicker)}</div>` : ""}
      <h1 class="stmt-head">${head}</h1>
      ${s.sub ? `<p class="stmt-sub">${nl2br(s.sub)}</p>` : ""}
      ${s.tail ? `<div class="stmt-tail"><span class="arr">→</span>${esc(s.tail)}</div>` : ""}
    </div>
  `;
}

function renderAgenda(s) {
  const cards = s.items.map((it, i) => `
    <div class="agenda-card a${i + 1}">
      <div class="a-time">${esc(it.time)}</div>
      <div class="a-title">${nl2br(it.title)}</div>
      <div class="a-desc">${nl2br(it.desc)}</div>
    </div>
  `).join("");
  return `
    <div class="top-head">
      <h2 class="h1">${nl2br(s.title)}</h2>
      ${s.lead ? `<p class="lead">${nl2br(s.lead)}</p>` : ""}
    </div>
    <div class="agenda-grid">${cards}</div>
    ${s.foot ? `<p class="agenda-foot">${s.footHtml || esc(s.foot)}</p>` : ""}
  `;
}

function renderFlow(s) {
  const node = (n, role) => {
    let inner = "";
    if (n.bubbles) inner = n.bubbles.map(b => `<div class="fn-bubble">${esc(b)}</div>`).join("");
    else if (n.page) inner = `
      <div class="fn-page">
        <div class="fp-bar"><span></span><span></span><span></span></div>
        <div class="fp-body">
          <div class="fp-h"></div>
          <div class="fp-langs">${n.page.map(l => `<b>${esc(l)}</b>`).join("")}</div>
          <div class="fp-line"></div><div class="fp-line s"></div>
        </div>
      </div>`;
    return `
      <div class="flow-node ${role}">
        <div class="fn-tag">${esc(n.tag)}</div>
        <div class="fn-title">${nl2br(n.title)}</div>
        ${inner}
        ${n.desc ? `<div class="fn-desc">${nl2br(n.desc)}</div>` : ""}
      </div>`;
  };
  return `
    <div class="top-head" style="margin-bottom:0;">
      <h2 class="h1">${nl2br(s.title)}</h2>
    </div>
    <div class="flow-wrap">
      ${node(s.before, "before")}
      <div class="flow-arrow">→</div>
      ${node(s.after, "after")}
    </div>
  `;
}

function renderCards(s) {
  const n = s.cards.length;
  // 2칸→2열, 3칸→3열, 4칸→2열2행, 5·6칸→3열(6은 3열2행). 세로 넘침 방지.
  const cls = "c" + (n <= 2 ? 2 : n === 3 ? 3 : n === 4 ? 4 : 6);
  const cards = s.cards.map((c, i) => `
    <div class="gcard">
      <div class="gc-head">
        ${c.no ? `<span class="gc-no">${esc(c.no)}</span>` : ""}
        <span class="gc-title">${nl2br(c.title)}</span>
      </div>
      ${c.desc ? `<p class="gc-desc">${nl2br(c.desc)}</p>` : ""}
    </div>
  `).join("");
  return `
    <div class="top-head">
      <h2 class="h1">${nl2br(s.title)}</h2>
      ${s.lead ? `<p class="lead">${nl2br(s.lead)}</p>` : ""}
    </div>
    <div class="cards-grid ${cls}">${cards}</div>
    ${s.foot ? `<p class="cards-foot">${s.footHtml || esc(s.foot)}</p>` : ""}
  `;
}

function renderTracks(s) {
  const letters = ["A", "B", "C"];
  const cls = ["tA", "tB", "tC"];
  const cards = s.tracks.map((t, i) => `
    <div class="track ${cls[i]}">
      <div class="t-band">
        <span class="t-letter">${letters[i]}</span>
        <span class="t-name">${nl2br(t.name)}</span>
      </div>
      <div class="t-cond">${nl2br(t.cond)}</div>
      <div class="t-path"><span class="pin">출발 지점</span>${nl2br(t.path)}</div>
    </div>
  `).join("");
  return `
    <div class="top-head">
      <h2 class="h1">${nl2br(s.title)}</h2>
      ${s.lead ? `<p class="lead">${nl2br(s.lead)}</p>` : ""}
    </div>
    <div class="tracks-grid">${cards}</div>
  `;
}

function renderSteps(s) {
  const cards = s.steps.map((st, i) => `
    <div class="step-card">
      <div class="s-no">${i + 1}</div>
      <div class="s-label">${st.code ? `<code>${esc(st.code)}</code>` : esc(st.label)}</div>
      ${st.note ? `<div class="s-note">${nl2br(st.note)}</div>` : ""}
    </div>
  `).join(`<div class="step-arrow">›</div>`);
  return `
    <div class="top-head" style="margin-bottom:0;">
      <h2 class="h1">${nl2br(s.title)}</h2>
      ${s.lead ? `<p class="lead">${nl2br(s.lead)}</p>` : ""}
    </div>
    <div class="steps-wrap">
      <div class="steps-row">${cards}</div>
      ${s.banner ? `<div class="steps-banner"><span class="live">${esc(s.bannerTag || "결과")}</span>${s.bannerHtml || esc(s.banner)}</div>` : ""}
    </div>
  `;
}

function renderShot(s) {
  const lis = s.points.map(p => `<li><span class="n">✓</span><span>${esc(p)}</span></li>`).join("");
  return `
    <div class="shot-grid">
      <div class="shot-left">
        <h2 class="shot-head">${nl2br(s.head)}</h2>
        <ul class="shot-list">${lis}</ul>
      </div>
      <div class="shot-frame-wrap">
        <div class="shot-frame">
          <div class="sb">
            <div class="sb-dots"><span></span><span></span><span></span></div>
            <div class="sb-url">${esc(s.url)}</div>
          </div>
          <div class="sb-body"><img src="${s.shot}" alt="${esc(s.alt || "데모 페이지 캡처")}"></div>
        </div>
      </div>
    </div>
  `;
}

function renderBeforeAfter(s) {
  const col = (c, role) => `
    <div class="ba-col ${role}">
      <div class="ba-tag">${esc(c.tag)}</div>
      <div class="ba-frame">
        <div class="baf-bar"><span></span><span></span><span></span></div>
        <div class="baf-body"><img src="${c.shot}" alt="${esc(c.alt || "")}"></div>
      </div>
      <div class="ba-cap">${nl2br(c.cap)}</div>
    </div>`;
  return `
    <div class="top-head" style="margin-bottom:0;">
      <h2 class="h1">${nl2br(s.title)}</h2>
    </div>
    <div class="ba-grid">
      ${col(s.before, "before")}
      <div class="ba-mid">→</div>
      ${col(s.after, "after")}
    </div>
  `;
}

const RENDERERS = {
  cover: renderCover, split: renderSplit, files: renderFiles,
  statement: renderStatement, agenda: renderAgenda, flow: renderFlow,
  cards: renderCards, tracks: renderTracks, steps: renderSteps,
  shot: renderShot, beforeAfter: renderBeforeAfter,
  todo: renderTodo,
};

/* ---------- 빌드 ---------- */
const stage = document.getElementById("stage");
const progressFill = document.getElementById("progress-fill");

function buildSlides() {
  const frag = document.createDocumentFragment();
  for (const s of slides) {
    const el = document.createElement("section");
    el.className = "slide";
    el.dataset.no = s.no;
    const theme = SECTION_THEME[s.section] || { a: "var(--lavender)", t: "var(--lavender-t)" };
    el.style.setProperty("--accent", theme.a);
    el.style.setProperty("--accent-t", theme.t);
    const render = RENDERERS[s.layout] || renderTodo;
    el.innerHTML = renderChrome(s) + render(s);
    frag.appendChild(el);
  }
  // 진행 바는 stage에 이미 있으니 그 앞에 슬라이드 삽입
  stage.insertBefore(frag, document.getElementById("progress-track"));
}

/* ---------- 내비게이션 ---------- */
let current = 1;
const slideEls = () => Array.from(stage.querySelectorAll(".slide"));

function show(n) {
  current = Math.max(1, Math.min(TOTAL, n));
  const els = slideEls();
  els.forEach(el => el.classList.toggle("is-active", Number(el.dataset.no) === current));
  // 진행 바 색을 현재 섹션 주색에 맞춤
  const activeEl = els.find(el => Number(el.dataset.no) === current);
  if (activeEl) {
    progressFill.style.background = activeEl.style.getPropertyValue("--accent") || "var(--accent)";
    document.getElementById("progress-track").style.background = activeEl.style.getPropertyValue("--accent-t") || "var(--accent-t)";
  }
  progressFill.style.width = (current / TOTAL * 100) + "%";
  if (history.replaceState) history.replaceState(null, "", "#" + current);
  else location.hash = "#" + current;
}
function next() { show(current + 1); }
function prev() { show(current - 1); }

function parseHash() {
  const h = parseInt(location.hash.replace("#", ""), 10);
  return (Number.isFinite(h) && h >= 1 && h <= TOTAL) ? h : 1;
}

/* ---------- 스케일 ---------- */
function fitStage() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const scale = Math.min(vw / 1600, vh / 900);
  stage.style.transform = "translate(-50%, -50%) scale(" + scale + ")";
}

/* ---------- 입력 바인딩 ---------- */
function bindNav() {
  window.addEventListener("keydown", (e) => {
    if (["ArrowRight", "PageDown", " ", "Spacebar"].includes(e.key)) { e.preventDefault(); next(); }
    else if (["ArrowLeft", "PageUp"].includes(e.key)) { e.preventDefault(); prev(); }
    else if (e.key === "Home") { e.preventDefault(); show(1); }
    else if (e.key === "End") { e.preventDefault(); show(TOTAL); }
  });
  // 화면 좌/우 클릭
  document.getElementById("viewport").addEventListener("click", (e) => {
    if (e.clientX < window.innerWidth / 2) prev(); else next();
  });
  window.addEventListener("hashchange", () => {
    const n = parseHash();
    if (n !== current) show(n);
  });
  window.addEventListener("resize", fitStage);
}

/* ---------- audit 모드 ---------- */
/* 전 장 순회: (a) 요소 overflow (scrollW>clientW+1 || scrollH>clientH+1)
              (b) getBoundingClientRect가 스테이지(1600×900) 경계 이탈
   이미지 로드 완료 후 실행. document.title = AUDIT:PASS | AUDIT:FAIL n건 */
function runAudit() {
  return new Promise((resolve) => {
    document.body.classList.add("audit-mode");
    // 스케일은 1로 고정해 좌표 검사를 단순화 (경계검사는 슬라이드 상대좌표라 translate 무관)
    stage.style.transform = "translate(-50%, -50%) scale(1)";
    const findings = [];
    const els = slideEls();

    // 검사 본체
    function inspect() {
      const EPS = 1;
      for (const slideEl of els) {
        const no = slideEl.dataset.no;
        // 검사 대상 동안 잠시 표시
        const wasActive = slideEl.classList.contains("is-active");
        slideEl.style.display = "block";

        const stageRect = { left: 0, top: 0, right: 1600, bottom: 900 };

        // 모든 자손 요소 검사 (진행바 제외)
        const descendants = slideEl.querySelectorAll("*");
        for (const node of descendants) {
          // (a) overflow
          if (node.scrollWidth > node.clientWidth + EPS ||
              node.scrollHeight > node.clientHeight + EPS) {
            // 이미지 자체는 clientWidth/scrollWidth가 같으므로 보통 안 걸림.
            // 텍스트 컨테이너 overflow만 잡힘.
            const tag = node.tagName.toLowerCase();
            const cls = (node.className && node.className.toString().slice(0, 40)) || "";
            findings.push(`장 ${no}: <${tag}.${cls}> overflow — scroll ${node.scrollWidth}x${node.scrollHeight} vs client ${node.clientWidth}x${node.clientHeight}`);
          }
        }

        // (a') 이중 안전망: 슬라이드 루트 자체의 scroll 크기가 스테이지(1600×900)를 넘는지.
        // 세로 auto-grow 넘침이 (a)의 자손 검사에 안 걸리는 경우 대비.
        if (slideEl.scrollWidth > 1600 + EPS || slideEl.scrollHeight > 900 + EPS) {
          findings.push(`장 ${no}: <slide> 루트 넘침 — scroll ${slideEl.scrollWidth}x${slideEl.scrollHeight} vs 스테이지 1600x900`);
        }

        // (b) 경계 이탈 — 슬라이드 직계/주요 요소의 위치를 스테이지 좌표로 검사
        // slideEl 자체가 1600x900 inset:0 이므로 그 안 요소의 offset 기반으로 검사
        const slideRect = slideEl.getBoundingClientRect();
        for (const node of descendants) {
          const style = getComputedStyle(node);
          if (style.display === "none" || style.visibility === "hidden") continue;
          const r = node.getBoundingClientRect();
          // 슬라이드 기준 상대 좌표
          const relLeft = r.left - slideRect.left;
          const relTop = r.top - slideRect.top;
          const relRight = r.right - slideRect.left;
          const relBottom = r.bottom - slideRect.top;
          if (relLeft < stageRect.left - EPS || relTop < stageRect.top - EPS ||
              relRight > stageRect.right + EPS || relBottom > stageRect.bottom + EPS) {
            const tag = node.tagName.toLowerCase();
            const cls = (node.className && node.className.toString().slice(0, 40)) || "";
            findings.push(`장 ${no}: <${tag}.${cls}> 경계 이탈 — rel box [${relLeft.toFixed(0)}, ${relTop.toFixed(0)}, ${relRight.toFixed(0)}, ${relBottom.toFixed(0)}] vs 스테이지 [0,0,1600,900]`);
          }
        }

        slideEl.style.display = wasActive ? "block" : "";
      }

      const pass = findings.length === 0;
      document.title = pass ? "AUDIT:PASS" : ("AUDIT:FAIL " + findings.length + "건");
      const report = document.getElementById("audit-report");
      report.textContent =
        (pass ? "AUDIT:PASS — 오버플로 0, 경계 이탈 0\n" : "AUDIT:FAIL " + findings.length + "건\n\n") +
        findings.join("\n") +
        "\n\n총 " + TOTAL + "장 검사 (스케일 1 기준, 스테이지 1600×900).";
      resolve();
    }

    // 이미지 로드 완료 대기
    const imgs = Array.from(stage.querySelectorAll("img"));
    let pending = imgs.filter(im => !im.complete).length;
    if (pending === 0) { inspect(); return; }
    let settled = false;
    imgs.forEach(im => {
      if (im.complete) return;
      const fin = () => { pending--; if (pending <= 0 && !settled) { settled = true; inspect(); } };
      im.addEventListener("load", fin);
      im.addEventListener("error", fin);
    });
    // 안전 타임아웃
    setTimeout(() => { if (!settled) { settled = true; inspect(); } }, 4000);
  });
}

/* ---------- 부트 ---------- */
function boot() {
  buildSlides();
  fitStage();

  const params = new URLSearchParams(location.search);
  if (params.get("audit") === "1") {
    runAudit();
    return; // audit 모드에서는 내비게이션 비활성
  }

  bindNav();
  show(parseHash());
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", boot);
} else {
  boot();
}
</script>
</body>
</html>
